      <div style={{marginBottom:10}}><Label>FONTE / BANCA</Label><input value={form.fonte||""} onChange={e=>F("fonte",e.target.value)} placeholder="Ex: CESPE 2023, FGV 2022, Simulado..." style={inp}/></div>
      <div style={{marginBottom:20}}>
        <Label>📸 PRINT DA QUESTÃO — a IA lê e preenche os campos automaticamente</Label>
        <div onDrop={handleDrop} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current?.click()}
          style={{border:`2px dashed ${C.border2}`,borderRadius:10,padding:"16px",textAlign:"center",cursor:"pointer",background:C.surface2,marginBottom:8}}>
          {form.imagem
            ? <div><img src={form.imagem} alt="preview" style={{maxHeight:120,borderRadius:8}}/><button onClick={e=>{e.stopPropagation();F("imagem",null);}} style={{display:"block",margin:"6px auto 0",...btn("#2e0c0c","#501a1a","#f87171"),fontSize:11}}>Remover</button></div>
            : <div><p style={{fontSize:24,marginBottom:6}}>📸</p><p style={{fontSize:12,color:C.textDim,margin:0}}>Arraste o print da questão ou clique para selecionar</p><p style={{fontSize:11,color:C.textDim2,marginTop:4}}>A IA vai ler e preencher o enunciado e alternativas automaticamente</p></div>}
        </div>
        {form.imagem&&<button onClick={lerQuestaoComIA} disabled={lendoImagem}
          style={{...btn(lendoImagem?"#0a0a1e":"#0d1a30",lendoImagem?C.border:"#1a4060",lendoImagem?C.textDim:"#60a5fa"),width:"100%",padding:"11px",fontSize:13}}>
          {lendoImagem?"🤖 Lendo questão com IA...":"🤖 Ler questão com IA — preencher campos automaticamente"}
        </button>}
        <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
      </div>
      <button onClick={salvar} style={{width:"100%",background:"linear-gradient(135deg,#2a1060,#1a2a60)",border:"1px solid #4a2a9e",color:"#d8c8ff",padding:"14px",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>➕ Salvar no Caderno "{caderno}"</button>
    </div>
  );
}

// ─── EXPORTAR ─────────────────────────────────────────────────────────────────
function Exportar({data,caderno,upd}) {
  const [copiado,setCopiado]=useState(null);
  const [filtro,setFiltro]=useState("todos");
  const prontas=(data.questoes||[]).filter(q=>q.caderno===caderno&&q.destino&&q.destino!=="arquivada");
  const filtradas=filtro==="todos"?prontas:prontas.filter(q=>q.destino===filtro);
  const qtdAnki=prontas.filter(q=>q.destino==="anki").length;
  const qtdNLM=prontas.filter(q=>q.destino==="notebooklm").length;

  function copy(txt,key){navigator.clipboard.writeText(txt).then(()=>{setCopiado(key);setTimeout(()=>setCopiado(null),2500);});}
  function copiarAnki(q){copy(`FRENTE:\n${q.enunciado}\n\n${q.alternativas?.length>0?q.alternativas.join("\n")+"\n\n":""}VERSO:\n${q.gabarito}${q.anotacao?"\n\nMACETE: "+q.anotacao:""}`,q.id+"_a");}
  function copiarNLM(q){copy(`# ${q.disciplina||""} — ${q.tema||""}\n\n## Questão\n${q.enunciado}\n\n${q.alternativas?.length>0?"## Alternativas\n"+q.alternativas.join("\n")+"\n\n":""}## Gabarito\n${q.gabarito}\n\n## Meu Erro\n${q.suaResposta||"-"}\n\n## Macete\n${q.anotacao||"-"}\n\n---`,q.id+"_n");}
  function copiarTodosAnki(){copy(prontas.filter(q=>q.destino==="anki").map(q=>`FRENTE:\n${q.enunciado}\n\nVERSO:\n${q.gabarito}${q.anotacao?"\nMACETE: "+q.anotacao:""}`).join("\n\n====================\n\n"),"all_a");}
  function copiarTodosNLM(){copy(prontas.filter(q=>q.destino==="notebooklm").map(q=>`# ${q.disciplina||""} — ${q.tema||""}\n\n## Questão\n${q.enunciado}\n\n## Gabarito\n${q.gabarito}\n\n## Meu Erro\n${q.suaResposta||"-"}\n\n## Macete\n${q.anotacao||"-"}\n\n---`).join("\n\n"),"all_n");}
  function marcarExp(id){upd(d=>({...d,questoes:d.questoes.map(q=>q.id===id?{...q,destino:"arquivada",acertosConsecutivos:0}:q)}));}

  return (
    <div style={{maxWidth:780}}>
      <h3 style={{margin:"0 0 6px",color:C.accent,fontSize:15}}>📤 Exportar</h3>
      <p style={{margin:"0 0 20px",fontSize:12,color:C.textDim}}>Questões maduras para sair do caderno.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        <div style={{background:"#071a10",border:"2px solid #0d3020",borderRadius:14,padding:18}}>
          <div style={{fontSize:28,fontWeight:700,color:"#22c55e",marginBottom:4}}>{qtdAnki}</div>
          <div style={{fontSize:13,color:"#4ade80",fontWeight:700,marginBottom:8}}>🟢 Prontas pro Anki</div>
          {qtdAnki>0&&<button onClick={copiarTodosAnki} style={{...btn("#0c2e18","#1a5030","#4ade80"),fontSize:12,width:"100%"}}>{copiado==="all_a"?"✅ Copiado!":` Copiar ${qtdAnki} card(s)`}</button>}
        </div>
        <div style={{background:"#071828",border:"2px solid #0d2040",borderRadius:14,padding:18}}>
          <div style={{fontSize:28,fontWeight:700,color:"#60a5fa",marginBottom:4}}>{qtdNLM}</div>
          <div style={{fontSize:13,color:"#93c5fd",fontWeight:700,marginBottom:8}}>🔵 Prontas pro NotebookLM</div>
          {qtdNLM>0&&<button onClick={copiarTodosNLM} style={{...btn("#071828","#1a4060","#60a5fa"),fontSize:12,width:"100%"}}>{copiado==="all_n"?"✅ Copiado!":` Copiar ${qtdNLM} doc(s)`}</button>}
        </div>
      </div>
      {prontas.length===0?<div style={{textAlign:"center",padding:"50px 20px",color:C.textDim}}><p style={{fontSize:32,marginBottom:12}}>🎯</p><p style={{fontSize:14}}>Nenhuma questão pronta ainda.</p><p style={{fontSize:12,color:C.textDim2}}>Acerte 2x seguidas na revisão para elas aparecerem aqui.</p></div>:filtradas.map(q=>{const dc=DESTINO_CONFIG[q.destino];const pb=(data.prioridadeBanca?.[caderno]||{})[q.disciplina]||"baixa";return(
        <div key={q.id} style={{background:dc.bg,border:`1px solid ${dc.border}`,borderRadius:12,padding:18,marginBottom:12}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}><Pill cor={dc.cor}>{dc.icon} {dc.label}</Pill><Pill cor={PRIORIDADE_COR[pb]}>{PRIORIDADE_LABEL[pb]}</Pill>{q.tipoErro&&<Pill cor={TIPO_ERRO_CONFIG[q.tipoErro]?.cor}>{TIPO_ERRO_CONFIG[q.tipoErro]?.icon} {TIPO_ERRO_CONFIG[q.tipoErro]?.label}</Pill>}</div>
          <p style={{margin:"0 0 4px",fontSize:11,color:C.textDim}}>{q.disciplina} · {q.tema}</p>
          <p style={{margin:"0 0 12px",fontSize:13,color:C.text,lineHeight:1.6}}>{q.enunciado.slice(0,120)}{q.enunciado.length>120?"...":""}</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {q.destino==="anki"&&<button onClick={()=>copiarAnki(q)} style={{...btn(dc.bg,dc.cor,dc.cor),fontSize:12}}>{copiado===q.id+"_a"?"✅ Copiado!":"📋 Copiar card Anki"}</button>}
            {q.destino==="notebooklm"&&<button onClick={()=>copiarNLM(q)} style={{...btn(dc.bg,dc.border,dc.cor),fontSize:12}}>{copiado===q.id+"_n"?"✅ Copiado!":"📋 Copiar doc NotebookLM"}</button>}
            <button onClick={()=>marcarExp(q.id)} style={{...btn(C.surface2,C.border2,C.textDim),fontSize:12}}>✅ Marcar exportada</button>
          </div>
        </div>
      );})}
    </div>
  );
}

// ─── BANCA ────────────────────────────────────────────────────────────────────
function BancaConfig({data,caderno,upd}) {
  const [nova,setNova]=useState("");
  const pb=(data.prioridadeBanca||{})[caderno]||{};
  const discExist=[...new Set((data.questoes||[]).filter(q=>q.caderno===caderno).map(q=>q.disciplina).filter(Boolean))];
  const todas=[...new Set([...Object.keys(pb),...discExist])].filter(Boolean);
  function set(disc,val){upd(d=>{const n=JSON.parse(JSON.stringify(d.prioridadeBanca||{}));if(!n[caderno])n[caderno]={};n[caderno][disc]=val;return{...d,prioridadeBanca:n};});}
  function add(){if(!nova.trim())return;set(nova.trim(),"media");setNova("");}
  return (
    <div style={{maxWidth:700}}>
      <h3 style={{margin:"0 0 6px",color:C.accent,fontSize:15}}>🎯 Prioridade da Banca — {caderno}</h3>
      <p style={{margin:"0 0 20px",fontSize:12,color:C.textDim,lineHeight:1.6}}>Define a ordem de revisão. Alta+Acender = revisado primeiro.</p>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {todas.map(disc=>{const p=pb[disc]||"media";const cnt=(data.questoes||[]).filter(q=>q.caderno===caderno&&q.disciplina===disc).length;return(
          <div key={disc} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:150}}><span style={{fontSize:13,color:C.text,fontWeight:600}}>{disc}</span>{cnt>0&&<span style={{fontSize:10,color:C.textDim,marginLeft:8}}>{cnt}q</span>}</div>
            <div style={{display:"flex",gap:6}}>{PRIORIDADES.map(pr=><button key={pr} onClick={()=>set(disc,pr)} style={{...btn(p===pr?PRIORIDADE_COR[pr]+"22":C.surface2,p===pr?PRIORIDADE_COR[pr]:C.border2,p===pr?PRIORIDADE_COR[pr]:C.textDim),fontSize:11,padding:"5px 10px",borderWidth:p===pr?2:1}}>{PRIORIDADE_LABEL[pr]}</button>)}</div>
          </div>
        );})}
      </div>
      <div style={{display:"flex",gap:10}}><input value={nova} onChange={e=>setNova(e.target.value)} placeholder="Adicionar disciplina..." style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&add()}/><button onClick={add} style={{...btn("#2a1060","#4a2a9e",C.accent),whiteSpace:"nowrap"}}>+ Adicionar</button></div>
    </div>
  );
}

// ─── LISTA ────────────────────────────────────────────────────────────────────
function Lista({data,caderno,upd}) {
  const [busca,setBusca]=useState("");
  const [filtroNivel,setFiltroNivel]=useState("Todos");
  const [filtroDisc,setFiltroDisc]=useState("Todas");
  const [aberto,setAberto]=useState(null);
  const [editando,setEditando]=useState(null); // questão sendo editada

  const qc=(data.questoes||[]).filter(q=>q.caderno===caderno);
  const discs=["Todas",...new Set(qc.map(q=>q.disciplina).filter(Boolean))];
  const filtradas=qc.filter(q=>{
    const mb=!busca||[q.enunciado,q.disciplina,q.tema,q.topico,q.gabarito,q.anotacao,q.fonte].filter(Boolean).some(s=>s.toLowerCase().includes(busca.toLowerCase()));
    const mn=filtroNivel==="Todos"||NIVEIS[q.nivel]===filtroNivel;
    const md=filtroDisc==="Todas"||q.disciplina===filtroDisc;
    return mb&&mn&&md;
  });

  function excluir(id,e) {
    e.stopPropagation();
    if(!confirm("Excluir esta questão permanentemente?")) return;
    upd(d=>({...d,questoes:d.questoes.filter(q=>q.id!==id)}));
    setAberto(null);
  }

  function abrirEdicao(q,e) {
    e.stopPropagation();
    setEditando({...q, alternativas: q.alternativas?.length>0 ? [...q.alternativas,...Array(4).fill("")].slice(0,4) : ["","","",""]});
  }

  function salvarEdicao() {
    if(!editando) return;
    const alts = editando.alternativas.filter(a=>a.trim());
    upd(d=>({...d,questoes:d.questoes.map(q=>q.id===editando.id?{...editando,alternativas:alts}:q)}));
    setEditando(null);
  }

  return (
    <div>
      {/* FILTROS */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar enunciado, gabarito, macete, fonte..." style={{...inp,flex:1,minWidth:200}}/>
        <select value={filtroNivel} onChange={e=>setFiltroNivel(e.target.value)} style={{...inp,width:"auto"}}><option>Todos</option>{NIVEIS.map(n=><option key={n}>{n}</option>)}</select>
        <select value={filtroDisc} onChange={e=>setFiltroDisc(e.target.value)} style={{...inp,width:"auto"}}>{discs.map(d=><option key={d}>{d}</option>)}</select>
      </div>
      <p style={{fontSize:12,color:C.textDim,marginBottom:12}}>{filtradas.length} questão(ões)</p>

      {/* MODAL EDIÇÃO */}
      {editando&&(
        <div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,overflowY:"auto",padding:"20px"}}>
          <div style={{background:"#12121e",border:`1px solid ${C.border2}`,borderRadius:16,padding:24,width:"100%",maxWidth:640,boxShadow:"0 20px 60px #000c",margin:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h4 style={{margin:0,color:C.accent,fontSize:15}}>✏️ Editar Questão</h4>
              <button onClick={()=>setEditando(null)} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:20}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div><Label>DISCIPLINA</Label><input value={editando.disciplina||""} onChange={e=>setEditando(v=>({...v,disciplina:e.target.value}))} style={inp}/></div>
              <div><Label>TEMA</Label><input value={editando.tema||""} onChange={e=>setEditando(v=>({...v,tema:e.target.value}))} style={inp}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div><Label>TÓPICO</Label><input value={editando.topico||""} onChange={e=>setEditando(v=>({...v,topico:e.target.value}))} style={inp}/></div>
              <div><Label>FONTE / BANCA</Label><input value={editando.fonte||""} onChange={e=>setEditando(v=>({...v,fonte:e.target.value}))} placeholder="Ex: CESPE 2023..." style={inp}/></div>
            </div>
            <div style={{marginBottom:10}}><Label color="#f87171">ENUNCIADO</Label><textarea value={editando.enunciado||""} onChange={e=>setEditando(v=>({...v,enunciado:e.target.value}))} rows={4} style={{...inp,resize:"vertical",lineHeight:1.7}}/></div>
            {editando.tipo==="multipla"&&<div style={{marginBottom:10}}><Label>ALTERNATIVAS</Label>{editando.alternativas.map((alt,i)=><input key={i} value={alt} onChange={e=>{const a=[...editando.alternativas];a[i]=e.target.value;setEditando(v=>({...v,alternativas:a}));}} placeholder={`Alt. ${String.fromCharCode(65+i)}`} style={{...inp,marginBottom:6}}/>)}</div>}
            <div style={{marginBottom:10}}><Label color="#4ade80">GABARITO</Label><textarea value={editando.gabarito||""} onChange={e=>setEditando(v=>({...v,gabarito:e.target.value}))} rows={3} style={{...inp,resize:"vertical",lineHeight:1.7}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div><Label color="#f97316">SUA RESPOSTA</Label><input value={editando.suaResposta||""} onChange={e=>setEditando(v=>({...v,suaResposta:e.target.value}))} style={inp}/></div>
              <div><Label>MACETE</Label><input value={editando.anotacao||""} onChange={e=>setEditando(v=>({...v,anotacao:e.target.value}))} style={inp}/></div>
            </div>
            <div style={{marginBottom:10}}><Label>TIPO DE ERRO</Label>
              <div style={{display:"flex",gap:8}}>
                {Object.entries(TIPO_ERRO_CONFIG).map(([key,cfg])=>(
                  <button key={key} onClick={()=>setEditando(v=>({...v,tipoErro:key}))} style={{flex:1,...btn(editando.tipoErro===key?cfg.cor+"22":C.surface2,editando.tipoErro===key?cfg.cor:C.border2,editando.tipoErro===key?cfg.cor:C.textDim),fontSize:12,padding:"8px"}}>
                    {cfg.icon} {cfg.label}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={salvarEdicao} style={{flex:1,...btn("#2a1060","#4a2a9e",C.accent),padding:"12px",fontSize:14}}>💾 Salvar alterações</button>
              <button onClick={()=>setEditando(null)} style={{...btn(C.surface2,C.border2,C.textDim),padding:"12px 20px"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* LISTA */}
      {filtradas.map(q=>{
        const pb=(data.prioridadeBanca?.[caderno]||{})[q.disciplina]||"baixa";
        const tInfo=q.tipoErro?TIPO_ERRO_CONFIG[q.tipoErro]:null;
        const dInfo=q.destino?DESTINO_CONFIG[q.destino]:null;
        return(
          <div key={q.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderLeft:`3px solid ${NIVEL_CORES[NIVEIS[q.nivel]]}`,borderRadius:10,padding:16,marginBottom:10,cursor:"pointer"}} onClick={()=>setAberto(aberto===q.id?null:q.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                  {q.disciplina&&<Tag bg="#3b1f6e22" color="#c8b8e8" border="#3b1f6e44">{q.disciplina}</Tag>}
                  {q.tema&&<Tag bg="#1e3a5f22" color="#93c5fd" border="#1e3a5f44">{q.tema}</Tag>}
                  {q.fonte&&<Tag bg="#1a1a0a22" color="#fbbf24" border="#fbbf2440">{q.fonte}</Tag>}
                  <Pill cor={NIVEL_CORES[NIVEIS[q.nivel]]}>{NIVEIS[q.nivel]}</Pill>
                  <Pill cor={PRIORIDADE_COR[pb]}>{PRIORIDADE_LABEL[pb]}</Pill>
                  {tInfo&&<Pill cor={tInfo.cor}>{tInfo.icon} {tInfo.label}</Pill>}
                  {dInfo&&<Pill cor={dInfo.cor}>{dInfo.icon} {dInfo.label}</Pill>}
                </div>
                <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.6}}>{aberto===q.id?q.enunciado:q.enunciado.slice(0,140)+(q.enunciado.length>140?"...":"")}</p>
              </div>
              {/* Botões sempre visíveis */}
              <div style={{display:"flex",gap:6,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={e=>abrirEdicao(q,e)} style={{...btn(C.surface2,C.border2,C.accent),fontSize:11,padding:"5px 10px"}} title="Editar">✏️</button>
                <button onClick={e=>excluir(q.id,e)} style={{...btn("#1a0808","#3a1010","#f87171"),fontSize:11,padding:"5px 10px"}} title="Excluir">🗑</button>
              </div>
            </div>

            {aberto===q.id&&<div style={{marginTop:14}}>
              {q.alternativas?.length>0&&<div style={{marginBottom:10}}>{q.alternativas.map((a,i)=><div key={i} style={{fontSize:12,color:C.textDim,padding:"5px 10px",background:C.surface2,borderRadius:6,marginBottom:4}}>{a}</div>)}</div>}
              <div style={{background:"#071a10",border:"1px solid #0d3020",borderRadius:8,padding:12,marginBottom:8}}>
                <p style={{margin:"0 0 4px",fontSize:11,color:"#4ade80",fontWeight:700}}>✅ GABARITO</p>
                <div style={{margin:0,fontSize:13,color:"#d4f0c8",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:q.gabarito?.replace(/\n/g,"<br/>")||""}}/>
              </div>
              {q.suaResposta&&<p style={{fontSize:12,color:"#f87171",padding:"7px 10px",background:"#1a0808",borderRadius:7,marginBottom:8}}>❌ {q.suaResposta}</p>}
              {q.anotacao&&<p style={{fontSize:12,color:"#6668aa",fontStyle:"italic",padding:"7px 10px",background:"#111128",borderRadius:7,marginBottom:8}}>📎 {q.anotacao}</p>}
              {q.fonte&&<p style={{fontSize:11,color:"#fbbf24",padding:"5px 10px",background:"#1a1a0a",borderRadius:7,marginBottom:8}}>📌 Fonte: {q.fonte}</p>}
              {q.historico?.length>0&&<div style={{marginBottom:8}}>
                <p style={{fontSize:11,color:C.textDim,marginBottom:6,fontWeight:700}}>HISTÓRICO</p>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{q.historico.slice(-12).map((h,i)=><span key={i} title={h.data} style={{fontSize:10,padding:"2px 6px",borderRadius:6,background:h.acertou?"#0c2e18":"#2e0c0c",color:h.acertou?"#4ade80":"#f87171"}}>{h.acertou?"✓":"✗"}</span>)}</div>
              </div>}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── METAS ────────────────────────────────────────────────────────────────────
function Metas({data,caderno,upd}) {
  const metas=(data.metas||{})[caderno]||{};
  function set(dia,campo,val){upd(d=>{const m=JSON.parse(JSON.stringify(d.metas||{}));if(!m[caderno])m[caderno]={};if(!m[caderno][dia])m[caderno][dia]={horas:0,questoes:0,descanso:false};m[caderno][dia][campo]=val;return{...d,metas:m};});}
  return (
    <div style={{maxWidth:700}}>
      <h3 style={{margin:"0 0 6px",color:C.accent,fontSize:15}}>⏱ Metas Semanais — {caderno}</h3>
      <p style={{margin:"0 0 20px",fontSize:12,color:C.textDim}}>O dashboard monitora em tempo real.</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {DIAS_SEMANA_FULL.map((dia,i)=>{const m=metas[i]||{horas:0,questoes:0,descanso:false};return(
          <div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",opacity:m.descanso?0.6:1}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text,minWidth:70}}>{dia}</span>
            <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.textDim,cursor:"pointer"}}><input type="checkbox" checked={!!m.descanso} onChange={e=>set(i,"descanso",e.target.checked)} style={{accentColor:C.accent}}/> Descanso</label>
            {!m.descanso&&<><label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.textDim}}>⏱<input type="number" min={0} max={12} step={0.5} value={m.horas} onChange={e=>set(i,"horas",parseFloat(e.target.value)||0)} style={{...inp,width:65,padding:"6px 8px"}}/>h</label><label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.textDim}}>📝<input type="number" min={0} max={200} value={m.questoes} onChange={e=>set(i,"questoes",parseInt(e.target.value)||0)} style={{...inp,width:65,padding:"6px 8px"}}/>q</label></>}
            {m.descanso&&<span style={{fontSize:12,color:"#60a5fa"}}>😴</span>}
          </div>
        );})}
      </div>
    </div>
  );
}

// ─── LEMBRETES ────────────────────────────────────────────────────────────────
function Lembretes({data,caderno,upd}) {
  const [form,setForm]=useState({texto:"",data:"",hora:"",turno:"Manhã"});
  const lems=(data.lembretes||[]).filter(l=>l.caderno===caderno);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  function add(){if(!form.texto.trim())return;upd(d=>({...d,lembretes:[...(d.lembretes||[]),{id:Date.now(),caderno,...form,feito:false,criadoEm:hoje()}]}));setForm({texto:"",data:"",hora:"",turno:"Manhã"});}
  function marcar(id,f){upd(d=>({...d,lembretes:d.lembretes.map(l=>l.id===id?{...l,feito:f}:l)}));}
  function excluir(id){upd(d=>({...d,lembretes:d.lembretes.filter(l=>l.id!==id)}));}
  const pend=lems.filter(l=>!l.feito); const conc=lems.filter(l=>l.feito);
  return (
    <div style={{maxWidth:600}}>
      <h3 style={{margin:"0 0 20px",color:C.accent,fontSize:15}}>🔔 Lembretes — {caderno}</h3>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18,marginBottom:24}}>
        <Label>NOVO LEMBRETE</Label>
        <input value={form.texto} onChange={e=>F("texto",e.target.value)} placeholder="O que fazer?" style={{...inp,marginBottom:10}} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
          <div><Label>DATA</Label><input type="date" value={form.data} onChange={e=>F("data",e.target.value)} style={inp}/></div>
          <div><Label>HORA</Label><input type="time" value={form.hora} onChange={e=>F("hora",e.target.value)} style={inp}/></div>
          <div><Label>TURNO</Label><select value={form.turno} onChange={e=>F("turno",e.target.value)} style={inp}>{TURNOS.map(t=><option key={t}>{t}</option>)}</select></div>
        </div>
        <button onClick={add} style={{...btn("#2a1060","#4a2a9e",C.accent),width:"100%",padding:"10px"}}>+ Adicionar</button>
      </div>
      {pend.length>0&&<div style={{marginBottom:20}}><p style={{fontSize:12,fontWeight:700,color:C.textDim,marginBottom:8}}>PENDENTES ({pend.length})</p>
        {pend.map(l=><div key={l.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <input type="checkbox" checked={false} onChange={()=>marcar(l.id,true)} style={{accentColor:"#4ade80",width:16,height:16,cursor:"pointer"}}/>
          <div style={{flex:1}}><p style={{margin:0,fontSize:14,color:C.text}}>{l.texto}</p><div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>{l.data&&<span style={{fontSize:11,color:C.textDim}}>📅 {new Date(l.data+"T12:00").toLocaleDateString("pt-BR")}</span>}{l.hora&&<span style={{fontSize:11,color:C.textDim}}>🕐 {l.hora}</span>}<span style={{fontSize:11,padding:"1px 7px",borderRadius:10,background:l.turno==="Manhã"?"#1e2a0a":l.turno==="Tarde"?"#2a1e0a":"#0a0a2a",color:l.turno==="Manhã"?"#a3e635":l.turno==="Tarde"?"#fb923c":"#818cf8"}}>{l.turno==="Manhã"?"🌅":l.turno==="Tarde"?"☀️":"🌙"} {l.turno}</span></div></div>
          <button onClick={()=>excluir(l.id)} style={{background:"none",border:"none",color:C.textDim2,cursor:"pointer",fontSize:18}}>×</button>
        </div>)}
      </div>}
      {conc.length>0&&<div><p style={{fontSize:12,fontWeight:700,color:C.textDim2,marginBottom:8}}>CONCLUÍDOS ({conc.length})</p>
        {conc.map(l=><div key={l.id} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 16px",marginBottom:6,display:"flex",alignItems:"center",gap:12,opacity:0.5}}>
          <input type="checkbox" checked={true} onChange={()=>marcar(l.id,false)} style={{accentColor:"#4ade80",width:16,height:16,cursor:"pointer"}}/>
          <p style={{margin:0,fontSize:13,color:C.textDim,textDecoration:"line-through",flex:1}}>{l.texto}</p>
          <button onClick={()=>excluir(l.id)} style={{background:"none",border:"none",color:C.textDim2,cursor:"pointer",fontSize:18}}>×</button>
        </div>)}
      </div>}
      {lems.length===0&&<p style={{color:C.textDim,textAlign:"center",padding:"30px 0",fontSize:13}}>Nenhum lembrete ainda.</p>}
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));

function WaitForFirebase() {
  const [ready, setReady] = useState(!!window._firebase);
  useEffect(() => {
    if (window._firebase) return;
    const handler = () => setReady(true);
    window.addEventListener("firebase-ready", handler);
    return () => window.removeEventListener("firebase-ready", handler);
  }, []);
  if (!ready) return <div style={{minHeight:"100vh",background:"#08080f",display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:"#666680",fontSize:14}}>Inicializando Firebase...</p></div>;
  return <App />;
}

root.render(<WaitForFirebase />);
</script>
